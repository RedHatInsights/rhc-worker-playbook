name: Lint

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: aevea/commitsar@v1.0.3
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.9'
      - uses: pre-commit/action@v3.0.1
  lint-language:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: get-woke/woke-action@v0
        with:
          fail-on-error: true
